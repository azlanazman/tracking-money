  logEl.style.display = 'block';
  const icons = { ok:'✓', err:'✗', info:'·', sub:'–' };
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.innerHTML = `<span class="dot">${icons[type]||'·'}</span><span>${msg}</span>`;

  logEl.scrollTop = logEl.scrollHeight;
}

// ── Seeder ─────────────────────────────────────────────

async function runSeed() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true;
  logEl.innerHTML = '';
  logEl.style.display = 'block';
  setStatus('Seeding in progress…', 'run');

  try {
    // 1. Sign in
    log('Signing in as demo@lumina.app…', 'info');
    await auth.signInWithEmailAndPassword(DEMO_EMAIL, DEMO_PASS);
    const uid = auth.currentUser.uid;
    log(`Signed in — UID: ${uid.slice(0, 12)}…`, 'ok');

    const uref = db.collection('users').doc(uid);

    // 2. Wipe existing data
    log('Clearing existing demo data…', 'info');
    await Promise.all(['transactions','annotations','alerts'].map(c=>wipeCollection(uref.collection(c))));
    log('  transactions, annotations, alerts cleared', 'sub');

    // 3. Seed settings/preferences
    log('Seeding preferences…', 'info');
    await uref.collection('settings').doc('preferences').set(PREFERENCES);
    log('  accounts, categories, pay period — done', 'ok');

    // 4. Seed budgets
    log('Seeding budgets…', 'info');
    await uref.collection('budgets').doc('settings').set(BUDGETS);
    log(`  ${Object.keys(BUDGETS).length} categories — done`, 'ok');

    // 5. Seed goals
    log('Seeding savings goals…', 'info');
    await uref.collection('goals').doc('list').set(GOALS);
    log(`  ${GOALS.goals.length} goals — done`, 'ok');

    // 6. Seed annotations
    log('Seeding life event annotations…', 'info');
    for (const a of ANNOTATIONS) {
      await uref.collection('annotations').add({ ...a, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      log(`  ${a.date} · ${a.label}`, 'sub');
    }
    log(`  ${ANNOTATIONS.length} annotations — done`, 'ok');

    // 7. Seed transactions (batched)
    log(`Seeding ${TX_DATA.length} transactions…`, 'info');
    const BATCH_SIZE = 400;
    let count = 0;
    for (let i = 0; i < TX_DATA.length; i += BATCH_SIZE) {
      const batch = db.batch();
      TX_DATA.slice(i, i + BATCH_SIZE).forEach(([date, amount, account, type, category, subcategory, description]) => {
        const ref = uref.collection('transactions').doc();
        // createdAt: parse date so ordering reflects date order
        const createdAt = new Date(date + 'T12:00:00').getTime() + count++;
        batch.set(ref, { date, amount, account, type, category, subcategory, description, createdAt });
      });
      await batch.commit();
      log(`  batch ${Math.floor(i / BATCH_SIZE) + 1}: ${Math.min(i + BATCH_SIZE, TX_DATA.length)} of ${TX_DATA.length} written`, 'sub');
    }
    log(`  ${TX_DATA.length} transactions — done`, 'ok');

    // 8. Sign out
    await auth.signOut();
    log('Signed out', 'sub');

    setStatus('Demo data seeded successfully — ready to use.', 'ok');
    document.getElementById('seed-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'block';

  } catch (err) {
    log('Error: ' + (err.message || err), 'err');
    setStatus('Seeding failed — see log above.', 'err');
    btn.disabled = false;
  }
}

// Delete all docs in a collection (up to 200 — enough for demo cleanup)
async function wipeCollection(colRef) {
  const snap = await colRef.limit(200).get();
  if (snap.empty) return;
  const batch = db.batch();
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}
